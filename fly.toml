# Fly.io — deploy mais barato e rápido: 1 container + SQLite em volume persistente,
# escalando a zero quando ocioso (paga ~nada parado; cold start de poucos segundos).
#
# Passos (uma vez):
#   fly launch --no-deploy            # ou ajuste "app" abaixo para um nome único
#   fly volumes create saas_data --size 1 --region gru
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32)
#   fly deploy
#
# Escalou? Troque para Postgres sem mudar código:
#   fly postgres create && fly postgres attach <db>   # define DATABASE_URL
#   (e remova o bloco [mounts] + o DATABASE_URL de SQLite abaixo, WEB_CONCURRENCY=2)

app = "saas-juridico"
primary_region = "gru"   # São Paulo

[build]
  dockerfile = "backend/Dockerfile"

[env]
  DATABASE_URL = "sqlite:////data/app.db"   # arquivo no volume persistente
  AUTO_CREATE_TABLES = "0"                  # schema via Alembic (no start)
  WEB_CONCURRENCY = "1"                     # 1 worker: consistente com SQLite + rate limit em memória
  CORS_ORIGINS = "*"                        # restrinja ao domínio do frontend em produção

[mounts]
  source = "saas_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0                  # escala a zero quando ocioso = mais barato

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"                          # menor VM; suficiente p/ 1 worker
